name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release-zip:
    name: Build and attach crestron.zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp manifest version from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "Stamping manifest version: $TAG"
          jq --arg v "$TAG" '.version = $v' \
            custom_components/crestron/manifest.json > manifest.tmp
          mv manifest.tmp custom_components/crestron/manifest.json
          cat custom_components/crestron/manifest.json

      - name: Build release zip
        run: |
          cd custom_components/crestron
          zip -r "${GITHUB_WORKSPACE}/crestron.zip" .

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: crestron.zip
